name: Upkeep
options:
  bundleIdPrefix: com.msjurset
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0

targets:
  Upkeep:
    type: application
    platform: macOS
    sources:
      - Sources/Upkeep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.msjurset.upkeep
        PRODUCT_NAME: Upkeep
        MARKETING_VERSION: "1.7.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        INFOPLIST_KEY_CFBundleDisplayName: Upkeep
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - package: Sparkle

  UpkeepUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/UITests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Upkeep
